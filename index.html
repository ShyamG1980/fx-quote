<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C4U FX Quote</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C4U Quote">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2540;
  --border: #1e3058;
  --accent: #3b82f6;
  --accent2: #10b981;
  --warn: #f59e0b;
  --red: #ef4444;
  --text: #94a3b8;
  --text-bright: #e2e8f0;
  --text-dim: #475569;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 20px;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.wrap { max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }

/* Header */
header { margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
h1 { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--text-bright); letter-spacing: 0.5px; }
.subtitle { font-size: 12px; color: var(--text-dim); font-family: var(--mono); margin-left: 48px; }

/* Rate ticker */
.ticker { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.ticker::-webkit-scrollbar { display: none; }
.tick { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; white-space: nowrap; flex-shrink: 0; }
.tick-pair { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.tick-rate { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text-bright); }
.tick-chg { font-size: 10px; font-family: var(--mono); }
.tick-chg.up { color: var(--accent2); }
.tick-chg.dn { color: var(--red); }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

/* Fields */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--text-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.field input, .field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-bright);
  padding: 10px 14px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Spread row */
.spread-row { display: flex; align-items: center; gap: 8px; }
.spread-row input { flex: 1; }
.spread-source { font-size: 10px; color: var(--accent); font-family: var(--mono); white-space: nowrap; }

/* Rate display */
.rate-display { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
.rate-label { font-size: 10px; color: var(--text-dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.rate-value { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--text-bright); letter-spacing: 1px; }
.rate-sub { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 4px; }
.rates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.rate-buy { border-left: 3px solid var(--accent2); }
.rate-sell { border-left: 3px solid var(--red); }
.rate-mid { border-left: 3px solid var(--accent); grid-column: 1/-1; }

/* Buttons */
.btn { width: 100%; padding: 13px; border-radius: 8px; border: none; font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.5px; }
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-email { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(16,185,129,0.3); margin-top: 10px; }
.btn-refresh { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 14px; border-radius: 6px; font-family: var(--mono); font-size: 11px; cursor: pointer; width: auto; }
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

/* Client selector */
.client-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-family: var(--mono); cursor: pointer; transition: all 0.15s; color: var(--text-dim); }
.chip:hover, .chip.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--accent); }

/* Status */
.status { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--mono); margin-bottom: 14px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
.status-dot.live { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Email preview */
.email-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 12px; font-family: var(--mono); color: var(--text); white-space: pre-wrap; line-height: 1.7; max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
.email-to { margin-bottom: 10px; }
.email-to input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text-bright); padding: 9px 12px; border-radius: 6px; font-family: var(--mono); font-size: 13px; outline: none; }
.email-to input:focus { border-color: var(--accent); }

/* API key setup */
.setup-notice { background: rgba(59,130,246,0.07); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 14px; font-size: 12px; font-family: var(--mono); color: var(--text-dim); line-height: 1.7; margin-bottom: 16px; }
.setup-notice strong { color: var(--accent); }

/* Notional */
.notional-display { font-family: var(--mono); font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 14px; }
.notional-display span { color: var(--text-bright); }

/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Loading spinner */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">💱</div>
      <h1>C4U FX QUOTE</h1>
    </div>
    <div class="subtitle">Live rate quoting tool — Currencies 4 You</div>
  </header>

  <!-- API Key setup -->
  <div class="setup-notice" id="setupNotice">
    <strong>API Key Required</strong><br>
    Enter your Open Exchange Rates App ID below to enable live rates.
    <div style="margin-top:10px">
      <input type="text" id="apiKeyInput" placeholder="Enter App ID..." style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text-bright);padding:8px 12px;border-radius:6px;font-family:var(--mono);font-size:12px;outline:none;margin-bottom:8px;">
      <button class="btn btn-primary" style="padding:8px" onclick="saveApiKey()">Save & Connect</button>
    </div>
  </div>

  <!-- Live ticker -->
  <div class="ticker" id="ticker"></div>

  <!-- Status -->
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not connected</span>
    <button class="btn-refresh" onclick="fetchRates()" id="refreshBtn" style="margin-left:auto">↻ Refresh</button>
  </div>

  <!-- Quote builder -->
  <div class="card">
    <div class="card-title">// Build Quote</div>

    <div class="field">
      <label>Client Name</label>
      <input type="text" id="clientName" placeholder="Type or select below...">
      <div class="client-chips" id="clientChips"></div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Base Currency</label>
        <select id="baseCcy"></select>
      </div>
      <div class="field">
        <label>Quote Currency</label>
        <select id="quoteCcy"></select>
      </div>
    </div>

    <div class="field">
      <label>Notional Amount</label>
      <input type="number" id="notional" placeholder="e.g. 100000" value="100000">
    </div>

    <div class="field">
      <label>Spread % <span style="color:var(--text-dim);font-size:10px">(from client history)</span></label>
      <div class="spread-row">
        <input type="number" id="spreadInput" step="0.0001" placeholder="e.g. 0.0100">
        <span class="spread-source" id="spreadSource"></span>
      </div>
    </div>

    <button class="btn btn-primary" onclick="buildQuote()" id="quoteBtn">Generate Quote</button>
  </div>

  <!-- Quote result -->
  <div class="card hidden" id="quoteResult">
    <div class="card-title" style="display:flex;justify-content:space-between">
      <span>// Quote</span>
      <span id="quoteTime" style="color:var(--text-dim)"></span>
    </div>

    <div class="rate-display rate-mid">
      <div class="rate-label">Mid-Market Rate</div>
      <div class="rate-value" id="midRate">—</div>
      <div class="rate-sub" id="pairLabel">—</div>
    </div>

    <div class="rates-grid">
      <div class="rate-display rate-buy">
        <div class="rate-label">Buy Rate (client buys base)</div>
        <div class="rate-value" id="buyRate">—</div>
        <div class="rate-sub" id="buyNotional">—</div>
      </div>
      <div class="rate-display rate-sell">
        <div class="rate-label">Sell Rate (client sells base)</div>
        <div class="rate-value" id="sellRate">—</div>
        <div class="rate-sub" id="sellNotional">—</div>
      </div>
    </div>

    <div class="notional-display" id="notionalDisplay"></div>

    <hr class="divider">

    <div class="card-title">// Quote Email</div>
    <div class="email-to">
      <input type="email" id="emailTo" placeholder="Client email address...">
    </div>
    <div class="email-preview" id="emailPreview"></div>
    <button class="btn btn-email" onclick="openEmail()">✉ Open in Outlook</button>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const API_KEY_STORE   = 'c4u_oxr_key';
const CLIENT_HISTORY  = 'sm_trades_v2';  // shared with spread monitor
const LAST_EMAIL_KEY  = 'c4u_quote_email';
const BUILT_IN_KEY    = 'eddb52143b7d45879d5fc8b3753a684c';

const COMMON_PAIRS = ['USD','EUR','GBP','JPY','CHF','AUD','CAD','NZD','HKD','SGD','NOK','SEK','DKK','ZAR','AED','SAR','QAR','KWD','BHD','OMR','TRY','PLN','CZK','HUF'];

let rates = {};
let lastFetch = null;

// ── Init ──────────────────────────────────────────────────────────
function init() {
  populateCurrencySelects();
  loadClientHistory();
  // Use built-in key if none stored
  if (!localStorage.getItem(API_KEY_STORE)) {
    localStorage.setItem(API_KEY_STORE, BUILT_IN_KEY);
  }
  document.getElementById('setupNotice').style.display = 'none';
  fetchRates();
  // Restore last email
  const lastEmail = localStorage.getItem(LAST_EMAIL_KEY);
  if (lastEmail) document.getElementById('emailTo').value = lastEmail;
  // Auto-refresh every 5 minutes
  setInterval(fetchRates, 5 * 60 * 1000);
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem(API_KEY_STORE, key);
  document.getElementById('setupNotice').style.display = 'none';
  fetchRates();
}

// ── Currency selects ──────────────────────────────────────────────
function populateCurrencySelects() {
  ['baseCcy','quoteCcy'].forEach((id, i) => {
    const sel = document.getElementById(id);
    COMMON_PAIRS.forEach(c => {
      const o = document.createElement('option');
      o.value = o.textContent = c;
      sel.appendChild(o);
    });
    sel.value = i === 0 ? 'EUR' : 'GBP';
  });
  document.getElementById('baseCcy').addEventListener('change', onPairChange);
  document.getElementById('quoteCcy').addEventListener('change', onPairChange);
}

function onPairChange() {
  const client = document.getElementById('clientName').value.trim();
  if (client) lookupClientSpread(client);
}

// ── Fetch live rates ──────────────────────────────────────────────
async function fetchRates() {
  const key = localStorage.getItem(API_KEY_STORE);
  if (!key) return;

  setStatus('loading', 'Fetching rates...');
  try {
    const res  = await fetch(`https://openexchangerates.org/api/latest.json?app_id=${key}&symbols=${COMMON_PAIRS.join(',')}`);
    const data = await res.json();
    if (data.error) throw new Error(data.description || data.error);

    rates = data.rates;
    lastFetch = new Date();
    setStatus('live', `Live · ${lastFetch.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})}`);
    renderTicker();
  } catch(e) {
    setStatus('error', 'Error: ' + e.message);
  }
}

function setStatus(state, text) {
  const dot  = document.getElementById('statusDot');
  const span = document.getElementById('statusText');
  dot.className  = 'status-dot' + (state === 'live' ? ' live' : '');
  span.textContent = text;
}

// ── Ticker ────────────────────────────────────────────────────────
function renderTicker() {
  const pairs = [['EUR','GBP'],['GBP','USD'],['EUR','USD'],['USD','JPY'],['USD','CHF'],['AUD','USD'],['USD','CAD']];
  const ticker = document.getElementById('ticker');
  ticker.innerHTML = pairs.map(([b,q]) => {
    const rate = getRate(b, q);
    if (!rate) return '';
    return `<div class="tick">
      <div class="tick-pair">${b}/${q}</div>
      <div class="tick-rate">${rate.toFixed(4)}</div>
    </div>`;
  }).join('');
}

// ── Cross rate calculation ────────────────────────────────────────
function getRate(base, quote) {
  if (!rates[base] || !rates[quote]) return null;
  // All rates are vs USD, so cross = quote_rate / base_rate
  return rates[quote] / rates[base];
}

// ── Client history from spread monitor ───────────────────────────
function loadClientHistory() {
  try {
    const raw = localStorage.getItem(CLIENT_HISTORY);
    if (!raw) return;
    const trades = JSON.parse(raw);
    const clients = [...new Set(trades.map(t => t.client).filter(Boolean))].sort();
    const chips = document.getElementById('clientChips');
    chips.innerHTML = clients.map(c =>
      `<div class="chip" onclick="selectClient('${c.replace(/'/g,"\\'")}')"> ${c}</div>`
    ).join('');
  } catch(e) {}
}

function selectClient(name) {
  document.getElementById('clientName').value = name;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  lookupClientSpread(name);
}

function lookupClientSpread(clientName) {
  try {
    const raw = localStorage.getItem(CLIENT_HISTORY);
    if (!raw) return;
    const trades = JSON.parse(raw);
    const base  = document.getElementById('baseCcy').value;
    const quote = document.getElementById('quoteCcy').value;
    const pair  = base + quote;

    // Find most recent trade for this client + pair
    const clientTrades = trades
      .filter(t => t.client === clientName && t.pair && (t.pair === pair || t.pair === quote+base))
      .sort((a,b) => {
        const da = new Date(a.date), db = new Date(b.date);
        return (isNaN(da)||isNaN(db)) ? 0 : db - da;
      });

    if (clientTrades.length > 0) {
      const last = clientTrades[0];
      document.getElementById('spreadInput').value = last.spread;
      document.getElementById('spreadSource').textContent = `↑ ${last.date || 'last trade'}`;
    } else {
      // Try any pair for this client
      const anyTrades = trades
        .filter(t => t.client === clientName)
        .sort((a,b) => new Date(b.date) - new Date(a.date));
      if (anyTrades.length > 0) {
        document.getElementById('spreadInput').value = anyTrades[0].spread;
        document.getElementById('spreadSource').textContent = `↑ ${anyTrades[0].pair || 'last trade'}`;
      } else {
        document.getElementById('spreadSource').textContent = '';
      }
    }
  } catch(e) {}
}

// ── Build quote ───────────────────────────────────────────────────
function buildQuote() {
  const base     = document.getElementById('baseCcy').value;
  const quote    = document.getElementById('quoteCcy').value;
  const spread   = parseFloat(document.getElementById('spreadInput').value);
  const notional = parseFloat(document.getElementById('notional').value) || 0;
  const client   = document.getElementById('clientName').value.trim() || 'Client';

  if (!Object.keys(rates).length) { alert('Please wait for live rates to load first.'); return; }
  if (base === quote) { alert('Please select two different currencies.'); return; }
  if (isNaN(spread) || spread <= 0) { alert('Please enter a valid spread.'); return; }

  const mid = getRate(base, quote);
  if (!mid) { alert(`Could not calculate rate for ${base}/${quote}.`); return; }

  const spreadFactor = spread / 100;
  const buyRate  = mid * (1 + spreadFactor);  // client buys base, pays more
  const sellRate = mid * (1 - spreadFactor);  // client sells base, receives less

  const dp = mid < 10 ? 4 : mid < 100 ? 3 : 2;

  // Notional converted
  const buyNotional  = notional > 0 ? (notional * buyRate).toLocaleString('en-GB', {maximumFractionDigits:2}) : '';
  const sellNotional = notional > 0 ? (notional * sellRate).toLocaleString('en-GB', {maximumFractionDigits:2}) : '';
  const notionalFmt  = notional > 0 ? notional.toLocaleString('en-GB') : '';

  document.getElementById('midRate').textContent  = mid.toFixed(dp);
  document.getElementById('pairLabel').textContent = `${base}/${quote} · Mid-market`;
  document.getElementById('buyRate').textContent   = buyRate.toFixed(dp);
  document.getElementById('sellRate').textContent  = sellRate.toFixed(dp);
  document.getElementById('buyNotional').textContent  = notional > 0 ? `${notionalFmt} ${base} = ${buyNotional} ${quote}` : '';
  document.getElementById('sellNotional').textContent = notional > 0 ? `${notionalFmt} ${base} = ${sellNotional} ${quote}` : '';
  document.getElementById('notionalDisplay').innerHTML = notional > 0
    ? `Notional: <span>${notionalFmt} ${base}</span>`  : '';

  const now = new Date();
  document.getElementById('quoteTime').textContent = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  // Build email
  const emailBody = buildQuoteEmail({client, base, quote, mid, buyRate, sellRate, notional, notionalFmt, buyNotional, sellNotional, dp, spread, now});
  document.getElementById('emailPreview').textContent = emailBody;

  document.getElementById('quoteResult').classList.remove('hidden');
  document.getElementById('quoteResult').scrollIntoView({behavior:'smooth', block:'start'});
}

function buildQuoteEmail({client, base, quote, mid, buyRate, sellRate, notional, notionalFmt, buyNotional, sellNotional, dp, spread, now}) {
  const timeStr = now.toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const notionalLine = notional > 0
    ? `\nNotional: ${notionalFmt} ${base}\n  → Buy  ${base}: ${buyNotional} ${quote}\n  → Sell ${base}: ${sellNotional} ${quote}`
    : '';

  return `Hi ${client},

Thank you for your enquiry. Please find below your indicative exchange rate quote:

Currency Pair:  ${base}/${quote}
Quote Time:     ${timeStr}

Mid-Market Rate: ${mid.toFixed(dp)}
Buy Rate:        ${buyRate.toFixed(dp)}  (you buy ${base})
Sell Rate:       ${sellRate.toFixed(dp)}  (you sell ${base})
${notionalLine}

Please note these rates are indicative only and subject to change. To lock in a rate, please confirm your order and we will process accordingly.

If you have any questions, please don't hesitate to get in touch.

Warm Regards,

Shyam S. Gokani Head of Trading | www.currencies4you.com

T: +44 (0) 1322 319550 M: +44 (0) 7534 285661 E: shyam.gokani@currencies4you.com A: Currencies 4 You, Regus House, Victory Way, Admirals Park, Crossway Dartford, DA2 6QD

This email and any attachments may be confidential and/or legally privileged. If you have received this email and you are not a named addressee, please inform the sender by return email and delete both emails. If you are not a named addressee you must not use, disclose, distribute, copy, print or rely on this email. Any views or opinions presented are solely those of the author. Any statements made, or intentions expressed in this communication may not necessarily reflect the view of Currencies 4 You Ltd. No content herein will bind Currencies 4 You Ltd or any associated company unless confirmed by a formal contract from Currencies 4 You Ltd. Any figures or amounts given in this email are quotations only and are subject to change. Currencies 4 You Ltd makes no representation or warranty as to the absence of viruses in this e-mail or any attachments. Currencies 4 You is a company registered in England and Wales (registered no. 06866898) Currencies 4 You's Payment and Foreign Currency Exchange Services are provided by Equals Connect Limited which is part of the Equals Group plc. Equals Connect is authorised by the Financial Conduct Authority to provide payment services. (Financial Services Register No: 671508).`;
}

function openEmail() {
  const to      = document.getElementById('emailTo').value.trim();
  const body    = document.getElementById('emailPreview').textContent;
  const base    = document.getElementById('baseCcy').value;
  const quote   = document.getElementById('quoteCcy').value;
  const subject = `FX Rate Quote — ${base}/${quote}`;
  if (to) localStorage.setItem(LAST_EMAIL_KEY, to);
  window.location.href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// ── Client name input listener ────────────────────────────────────
document.getElementById('clientName').addEventListener('input', function() {
  const val = this.value.trim();
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.textContent.trim() === val);
  });
  if (val) lookupClientSpread(val);
});

// ── Start ─────────────────────────────────────────────────────────
init();

// ── Service worker ────────────────────────────────────────────────
